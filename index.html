<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무한사격장</title>
  <meta name="description" content="무한사격장은 브라우저에서 즐기는 3D FPS 사격 게임입니다. 무한모드에서 계속 표적을 부수거나 경쟁모드에서 빠른 기록에 도전하세요." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.xn--i89au9y96dbmirps.kro.kr/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="무한사격장" />
  <meta property="og:title" content="무한사격장" />
  <meta property="og:description" content="브라우저에서 즐기는 3D FPS 사격 게임. 무한모드로 계속 표적을 부수고, 경쟁모드로 빠른 기록에 도전하세요." />
  <meta property="og:url" content="https://www.xn--i89au9y96dbmirps.kro.kr/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="무한사격장" />
  <meta name="twitter:description" content="브라우저에서 즐기는 3D FPS 사격 게임. 무한모드와 경쟁모드에서 표적을 맞추세요." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="overlay">
    <div class="overlay-content">
      <h1>무한사격장</h1>
      <div id="weapon-select" aria-label="무기 선택">
        <button type="button" class="weapon-option active" data-weapon="pixel">픽셀스나</button>
        <button type="button" class="weapon-option" data-weapon="event">이벤트 호라이즌</button>
      </div>
      <div class="mode-select">
        <button class="mode-btn" id="infinite-mode-btn" type="button">무한모드</button>
        <button class="mode-btn" id="competitive-mode-btn" type="button">경쟁모드</button>
      </div>
      <small>Shift 달리기 · C 슬라이딩 · ESC 일시정지</small>
    </div>
  </div>

  <div id="crosshair">+</div>

  <div id="scope-overlay">
    <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <circle cx="160" cy="160" r="158" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
      <line x1="0" y1="160" x2="320" y2="160" stroke="rgba(255,255,255,0.85)" stroke-width="1"/>
      <line x1="160" y1="0" x2="160" y2="320" stroke="rgba(255,255,255,0.85)" stroke-width="1"/>
      <circle cx="160" cy="160" r="4" stroke="rgba(255,255,255,0.7)" stroke-width="1" fill="none"/>
      <line x1="148" y1="200" x2="172" y2="200" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <line x1="148" y1="240" x2="172" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <line x1="148" y1="120" x2="172" y2="120" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <line x1="148" y1="80" x2="172" y2="80" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </svg>
  </div>

  <div id="hud">
    <span id="score">SCORE: 0</span>
    <span id="timer">00:00.00</span>
    <span id="ammo">AMMO: 10</span>
  </div>

  <div id="completion-message" class="hidden">
    <p id="completion-time"></p>
    <button id="restart-btn">다시 시작</button>
  </div>

  <button id="records-btn">기록보기</button>
  <div id="map-credit">출처: 로블럭스 라이벌</div>

  <div id="records-modal" class="hidden">
    <div id="records-modal-inner">
      <h2>기록 순위</h2>
      <ol id="records-list"></ol>
      <div id="my-latest-record" style="display:none"></div>
      <button id="modal-close-btn">닫기</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
